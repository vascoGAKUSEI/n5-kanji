<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>N5 Kanji App</title>

<style>

body {

  margin: 0;

  height: 100vh;

  font-family: -apple-system, BlinkMacSystemFont, sans-serif;

  background: #f4efe6;

  display: flex;

  justify-content: center;

  align-items: center;

}

.app {

  background: white;

  width: 90%;

  max-width: 380px;

  padding: 28px;

  border-radius: 24px;

  text-align: center;

  box-shadow: 0 10px 30px rgba(0,0,0,0.12);

}

h1 {

  font-size: 24px;

  margin-bottom: 20px;

}

#kanji {

  font-size: 110px;

  margin: 20px 0;

}

#furigana {

  font-size: 26px;

  color: #5a6f38;

  margin-bottom: 10px;

}

#meaning {

  font-size: 24px;

  font-weight: bold;

  margin-bottom: 12px;

}

#description {

  font-size: 16px;

  color: #555;

  min-height: 50px;

}

button {

  margin-top: 24px;

  padding: 14px 22px;

  font-size: 18px;

  border: none;

  border-radius: 14px;

  background: #5a6f38;

  color: white;

}

</style>

</head>

<body>

<div class="app">

  <h1>JLPT N5 Kanji</h1>

  <div id="kanji"></div>

  <div id="furigana"></div>

  <div id="meaning"></div>

  <button onclick="showRandomKanji()">Next Kanji</button>

</div>

function showRandomKanji() {
  const item = kanjiList[Math.floor(Math.random() * kanjiList.length)];

  document.getElementById("kanji").textContent = item.kanji;
  document.getElementById("furigana").textContent = item.furigana;
  document.getElementById("meaning").textContent = item.meaning;
  document.getElementById("description").textContent = item.description;
}

</body>
</html>
